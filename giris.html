<!doctype html>
<html lang="az">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="css/style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/material-design-iconic-font@2.2.0/dist/css/material-design-iconic-font.min.css"
    />

    <title>Giriş</title>
  </head>

  <body>
    <div class="main-container">
      <div class="card">
        <div class="image-box">
          <img src="images/giris-sekli.jpg" />
        </div>

        <div class="form-box">
          <h2>Giriş</h2>

          <div class="form-group">
            <i class="zmdi zmdi-account"></i>
            <input type="text" placeholder="Adınız" />
          </div>

          <div class="form-group">
            <i class="zmdi zmdi-lock"></i>
            <input type="password" placeholder="Parol" />
          </div>

          <div class="checkbox">
            <input type="checkbox" />
            <span>Məni xatırla</span>
          </div>

          <button class="btn">Giriş</button>

          <div class="social-login">
            <p>və ya bununla daxil ol</p>
            <ul class="socials">
              <li>
                <a href="#"
                  ><i class="display-flex-center zmdi zmdi-facebook"></i
                ></a>
              </li>
              <li>
                <a href="#"
                  ><i class="display-flex-center zmdi zmdi-twitter"></i
                ></a>
              </li>
              <li>
                <a href="#"
                  ><i class="display-flex-center zmdi zmdi-google"></i
                ></a>
              </li>
            </ul>
            <p style="margin-top: 15px">
              Hesabın yoxdur?
              <a href="qeydiyyat.html">Qeydiyyatdan keç</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
